<script>
let provider, signer, userAddress;

const CHAIN_ID = 78600; // apna Arc testnet chain id yaha verify karke lagao
const RPC_NAME = "ARC Testnet";

// REAL deployed USDC contract lagao
const USDC_CONTRACT = "0xYourRealUSDCContract";

const USDC_ABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function transfer(address to, uint256 amount) returns (bool)"
];

function openModal() {
    document.getElementById('walletModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('walletModal').style.display = 'none';
}

async function initConnect(walletType) {

    closeModal();

    let ethProvider = null;

    // METAMASK
    if (walletType === 'metamask') {
        ethProvider = window.ethereum;
    }

    // OKX
    else if (walletType === 'okx') {
        ethProvider = window.okxwallet?.ethereum || window.ethereum;
    }

    // TRUST
    else if (walletType === 'trust') {
        ethProvider = window.ethereum;
    }

    // BITGET
    else if (walletType === 'bitget') {
        ethProvider = window.bitkeep?.ethereum || window.ethereum;
    }

    // RABBY
    else if (walletType === 'rabby') {
        ethProvider = window.ethereum;
    }

    if (!ethProvider) {
        alert("Wallet not detected");
        return;
    }

    try {

        provider = new ethers.providers.Web3Provider(ethProvider);

        await provider.send("eth_requestAccounts", []);

        signer = provider.getSigner();

        userAddress = await signer.getAddress();

        const network = await provider.getNetwork();

        console.log("Connected Network:", network);

        document.getElementById('connectBtn').innerText = "CONNECTED";

        document.getElementById('dcBtn').classList.remove('hidden');

        document.getElementById('myFullAddr').innerText = userAddress;

        document.getElementById('qrImage').src =
            `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${userAddress}`;

        await updateBalances();

        alert("Wallet Connected Successfully");

    } catch (err) {

        console.error(err);

        alert("Wallet connection failed");
    }
}

async function updateBalances() {

    if (!provider || !userAddress) return;

    try {

        const contract = new ethers.Contract(
            USDC_CONTRACT,
            USDC_ABI,
            provider
        );

        const bal = await contract.balanceOf(userAddress);

        const formatted = ethers.utils.formatUnits(bal, 6);

        document.getElementById('balanceDisp').innerText =
            Number(formatted).toFixed(4);

    } catch (err) {

        console.error(err);

        document.getElementById('balanceDisp').innerText = "0.0000";
    }
}

async function executeAction() {

    if (!signer) {
        openModal();
        return;
    }

    const target =
        document.getElementById('recipient').value.trim();

    const amt =
        document.getElementById('inputAmt').value.trim();

    if (!ethers.utils.isAddress(target)) {
        alert("Invalid address");
        return;
    }

    if (!amt || Number(amt) <= 0) {
        alert("Invalid amount");
        return;
    }

    try {

        document.getElementById('actionBtn').innerText =
            "PROCESSING...";

        const contract = new ethers.Contract(
            USDC_CONTRACT,
            USDC_ABI,
            signer
        );

        const tx = await contract.transfer(
            target,
            ethers.utils.parseUnits(amt, 6)
        );

        console.log("TX:", tx.hash);

        addHistory(amt, target, tx.hash);

        alert(
`✅ Transaction Submitted

TX HASH:
${tx.hash}

View:
https://testnet.arcscan.app/tx/${tx.hash}`
        );

        const receipt = await tx.wait();

        console.log(receipt);

        if (receipt.status === 1) {

            await updateBalances();

            alert("Transaction Confirmed On ARC");

        } else {

            alert("Transaction failed on-chain");
        }

    } catch (err) {

        console.error(err);

        if (err.code === 4001) {

            alert("Transaction rejected");

        } else {

            alert(
                err?.reason ||
                err?.message ||
                "Transaction failed"
            );
        }

    } finally {

        document.getElementById('actionBtn').innerText =
            "Execute Engine";
    }
}

function addHistory(amt, addr, txHash) {

    const log = document.getElementById('historyLog');

    const noAct = document.getElementById('noActivity');

    if (noAct) noAct.remove();

    const item = document.createElement('div');

    item.className =
        "flex justify-between items-center border-b border-yellow-500/10 pb-6";

    item.innerHTML = `
    <div>
        <span class="text-yellow-400 font-black text-[14px]">
            SENT
        </span>

        <span class="text-white ml-4 font-black text-[18px]">
            ${amt} USDC
        </span>

        <p class="text-[10px] text-yellow-700 mt-2 font-mono uppercase">
            TO: ${addr}
        </p>

        <a
            href="https://testnet.arcscan.app/tx/${txHash}"
            target="_blank"
            class="text-blue-400 text-[10px]"
        >
            VIEW TX
        </a>
    </div>

    <div class="text-right text-green-500 font-black text-[12px]">
        SUCCESS
    </div>
    `;

    log.prepend(item);
}

function disconnectNode() {

    provider = null;
    signer = null;
    userAddress = null;

    document.getElementById('connectBtn').innerText = "CONNECT";

    document.getElementById('dcBtn').classList.add('hidden');

    document.getElementById('balanceDisp').innerText = "0.0000";

    document.getElementById('myFullAddr').innerText =
        "AWAITING_AUTH";
}
            </script>
