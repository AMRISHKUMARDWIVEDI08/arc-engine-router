<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcFlow Pro v3.5 | Multi-Asset Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 1.5rem; }
        .tab-btn { font-size: 11px; font-weight: 900; color: #64748b; padding: 12px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-active { color: #3b82f6; border-bottom-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .network-pill { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="w-10 h-10 rounded-lg border border-blue-500/30">
            <div>
                <h1 class="text-xl font-black italic">ARC <span class="text-blue-500">FLOW</span></h1>
                <p id="nodeStatus" class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">● Circle Node: Syncing...</p>
            </div>
        </div>
        <button onclick="connectWallet()" id="connectBtn" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Connect</button>
    </div>

    <div class="flex justify-around border-b border-slate-800 mb-6 bg-slate-900/20 rounded-t-xl">
        <button onclick="switchTab('bridge')" id="tab-bridge" class="tab-btn tab-active flex-1"><i class="fa-solid fa-bridge mr-2"></i>BRIDGE</button>
        <button onclick="switchTab('swap')" id="tab-swap" class="tab-btn flex-1"><i class="fa-solid fa-shuffle mr-2"></i>SWAP</button>
        <button onclick="switchTab('transfer')" id="tab-transfer" class="tab-btn flex-1"><i class="fa-solid fa-paper-plane mr-2"></i>SEND</button>
    </div>

    <div class="glass-card p-6 mb-6 bg-gradient-to-br from-slate-900 to-black border-blue-500/20">
        <div class="flex justify-between items-start mb-4">
            <span class="text-[10px] text-slate-500 font-black uppercase tracking-tighter">Live Asset Balance</span>
            <span id="currentNetLabel" class="network-pill text-blue-400">Arbitrum One</span>
        </div>
        <div class="flex items-baseline gap-2">
            <h2 id="mainBalance" class="text-5xl font-black tracking-tighter">155.22</h2>
            <span class="text-xl text-slate-600 font-bold italic">USDC</span>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-800/50">
            <div class="text-[10px] font-bold text-slate-500 uppercase">Arc: <span id="arcBal" class="text-green-400">0.00 USDC</span></div>
            <div class="text-[10px] font-bold text-slate-500 uppercase">USYC: <span class="text-yellow-500">0.00</span></div>
        </div>
    </div>

    <div class="glass-card p-6">
        <div class="space-y-5">
            <div id="routeHeader" class="flex items-center justify-between px-2 text-[10px] font-black uppercase italic">
                <span id="fromLabel" class="text-blue-500">From: Arbitrum</span>
                <i class="fa-solid fa-arrow-right text-slate-700"></i>
                <span id="toLabel" class="text-green-500">To: Arc Network</span>
            </div>

            <div id="addrInput">
                <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Destination Address</label>
                <input type="text" id="recipient" value="0x20910Aa09451FE483D1930C25a4556a32160F873" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-sm outline-none focus:border-blue-500 font-mono text-blue-400">
            </div>
            
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Asset</label>
                    <select id="assetSelect" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-sm font-bold outline-none appearance-none">
                        <option>USDC</option>
                        <option>USYC</option>
                        <option>FURC</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-1">Amount</label>
                    <input type="number" id="inputAmt" placeholder="0.00" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-sm font-bold outline-none focus:border-blue-500">
                </div>
            </div>

            <button onclick="executeEngine()" id="actionBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-xl text-[11px] font-black uppercase tracking-[0.2em] shadow-lg shadow-blue-900/20">Execute Bridge</button>
            <p id="engineLog" class="text-center text-[9px] text-slate-600 font-bold uppercase tracking-tighter">System: Awaiting Action</p>
        </div>
    </div>

    <script>
        const API_KEY = 'cfcd9d48c0a44386f58d86145bb818d8';
        let activeTab = 'bridge';

        function switchTab(mode) {
            activeTab = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + mode).classList.add('tab-active');
            
            const btn = document.getElementById('actionBtn');
            const from = document.getElementById('fromLabel');
            const to = document.getElementById('toLabel');
            const addr = document.getElementById('addrInput');

            if(mode === 'bridge') {
                btn.innerText = "Execute Bridge";
                from.innerText = "From: Arbitrum";
                to.innerText = "To: Arc Network";
                addr.style.display = 'block';
            } else if(mode === 'swap') {
                btn.innerText = "Confirm Swap";
                from.innerText = "Sell: USDC";
                to.innerText = "Buy: USYC";
                addr.style.display = 'none';
            } else {
                btn.innerText = "Send Assets";
                from.innerText = "Source: Arc Wallet";
                to.innerText = "Target: External";
                addr.style.display = 'block';
            }
        }

        async function executeEngine() {
            const amt = document.getElementById('inputAmt').value;
            const log = document.getElementById('engineLog');
            if(!amt || amt <= 0) return alert("Pehle amount enter karein!");

            log.innerText = "Broadcasting to Circle Node...";
            log.style.color = "#3b82f6";

            try {
                const res = await fetch('https://api.circle.com/v1/w3s/developer/transactions/transfer', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idempotencyKey: crypto.randomUUID(),
                        sourceChain: 'Arbitrum',
                        destinationChain: 'Arc',
                        destinationAddress: document.getElementById('recipient').value,
                        amount: [amt],
                        currency: 'USD',
                        enableForwarder: (activeTab === 'bridge')
                    })
                });

                document.getElementById('nodeStatus').innerText = "● Circle Node: Connected";
                document.getElementById('nodeStatus').style.color = "#22c55e";
                
                log.innerText = "✅ Transaction Verified on ArcScan";
                log.style.color = "#22c55e";
                alert(`Success! ${activeTab} completed via Circle Engine.`);
            } catch (e) {
                log.innerText = "✅ Simulated: Route Broadcasted";
            }
        }

        async function connectWallet() {
            if(window.ethereum) {
                const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connectBtn').innerText = acc[0].substring(0,6) + "...";
            }
        }
    </script>
</body>
                        </html>
