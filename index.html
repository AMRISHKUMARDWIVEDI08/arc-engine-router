<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARC ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #facc15, #eab308); 
            color: #000; 
            font-family: system-ui, -apple-system, sans-serif; 
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(0,0,0,0.95); 
            border: 4px solid #000; 
            border-radius: 2.8rem; 
            box-shadow: 0 35px 70px rgba(0,0,0,0.5);
        }
        .big-number { font-size: 4.2rem; font-weight: 900; color: white; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div class="text-center py-8">
        <h1 class="text-4xl font-black tracking-tighter">ARC ENGINE</h1>
        <p class="text-black/70 font-medium">Native Arc Testnet</p>
    </div>

    <div class="glass-card p-8 text-white">
        <button onclick="connectWallet()" id="connectBtn"
                class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-6 rounded-3xl text-xl transition">
            Connect Wallet
        </button>
    </div>

    <script>
        async function connectWallet() {
            if (!window.ethereum) return alert("MetaMask install karo");

            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const address = await signer.getAddress();

                document.getElementById("connectBtn").innerHTML = `✅ Connected<br><small class="text-xs">${address.slice(0,8)}...${address.slice(-6)}</small>`;
                alert("Wallet Connected Successfully!");
            } catch(e) {
                alert("Connection failed");
            }
        }

        // Auto connect on load
        window.onload = () => {
            if (window.ethereum) console.log("Wallet detected");
        };
    </script>
</body>
</html>
