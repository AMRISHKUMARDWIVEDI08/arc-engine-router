<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Gateway - SonicFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        .arc-banner {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://raw.githubusercontent.com/AMRISHKUMARDWIVEDI08/arc-sonic-router/main/logo.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            height: 180px;
            border-radius: 24px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .btn-arc { background: linear-gradient(90deg, #1e40af, #7e22ce); box-shadow: 0 0 20px rgba(126, 34, 206, 0.4); }
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
    </style>
</head>
<body class="p-4 min-h-screen" onclick="enableAudio()">

    <div class="flex justify-between items-center mb-6 mt-2">
        <div class="flex items-center gap-2">
            <img src="logo.png" class="h-10 w-10 object-contain">
            <h1 class="text-xl font-black tracking-tighter italic">ARC <span class="text-blue-500">GATEWAY</span></h1>
        </div>
        <button id="walletBtn" onclick="toggleWallet()" class="glass px-4 py-2 text-[10px] font-bold text-blue-400 uppercase">Connect</button>
    </div>

    <div class="arc-banner w-full mb-8 flex flex-col items-center justify-center text-center p-4">
        <h2 class="text-2xl font-black uppercase tracking-widest text-white drop-shadow-lg">ARC NETWORK</h2>
        <p class="text-[9px] font-bold text-blue-300 uppercase tracking-[0.3em]">The Gateway to Multichain Future</p>
    </div>

    <div class="glass p-6 mb-8 border-white/5">
        <div class="flex gap-6 text-[10px] font-black text-slate-500 uppercase mb-8 border-b border-white/5 pb-2">
            <span class="text-blue-400 border-b-2 border-blue-400 pb-2">Transfer</span>
            <span class="opacity-30">Bridge</span>
            <span class="opacity-30">Swap</span>
        </div>

        <div class="input-box p-4 mb-4">
            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Recipient Address</label>
            <input type="text" id="target" placeholder="0x..." class="bg-transparent w-full text-xs outline-none text-blue-400 font-mono">
        </div>

        <div class="input-box p-4 mb-8">
            <div class="flex justify-between mb-2">
                <span class="text-[8px] font-bold text-slate-500 uppercase">Amount</span>
                <span id="bal" class="text-[8px] font-bold text-green-500">BAL: 0.00</span>
            </div>
            <div class="flex justify-between items-center">
                <input type="number" id="amt" placeholder="0.0" class="bg-transparent text-4xl font-black outline-none w-1/2">
                <span class="text-xs font-black italic text-slate-400">USDC</span>
            </div>
        </div>

        <button onclick="send()" class="w-full btn-arc py-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">
            Execute Gateway Route
        </button>
    </div>

    <script>
        let userAddr = null;
        let audioOk = false;

        function enableAudio() { audioOk = true; }

        function speak(t) {
            if (audioOk) {
                const s = new SpeechSynthesisUtterance(t);
                s.rate = 1.1;
                window.speechSynthesis.speak(s);
            }
        }

        async function toggleWallet() {
            if (userAddr) {
                userAddr = null;
                document.getElementById('walletBtn').innerText = "Connect";
                document.getElementById('bal').innerText = "BAL: 0.00";
                speak("Gateway Closed. Wallet Disconnected.");
                return;
            }

            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    userAddr = await provider.getSigner().getAddress();
                    
                    // Real Balance Fetch
                    const b = await provider.getBalance(userAddr);
                    const formatted = parseFloat(ethers.utils.formatEther(b)).toFixed(4);
                    
                    document.getElementById('walletBtn').innerText = userAddr.substring(0,6)+"..."+userAddr.substring(38);
                    document.getElementById('bal').innerText = "BAL: " + formatted;
                    speak("Welcome to Arc Gateway. Wallet Connected.");
                } catch (e) { speak("Connection Error"); }
            } else { alert("Use Mises Browser"); }
        }

        function send() {
            if (!userAddr) return speak("Please connect to the gateway first");
            speak("Transaction Successful. Route Executed.");
            alert("Success!");
        }
    </script>
</body>
                </html>
