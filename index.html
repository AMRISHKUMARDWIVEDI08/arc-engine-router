<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcFlow Pro V26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; color: white; font-family: sans-serif; }
        .glass-panel { background: #111827; border: 1px solid #1f2937; border-radius: 1.5rem; }
        .nav-btn { background: #1e293b; border: 1px solid #334155; padding: 0.5rem 1.5rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 600; }
        .btn-blue { background: #2563eb; color: white; border: none; }
        /* Tab Logic Classes */
        .tab-item { background: #1e293b; color: #94a3b8; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .tab-active { background: #2563eb; color: white; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-bold italic">ArcFlow <span class="text-blue-500 font-normal text-xs uppercase">Pro</span></h1>
            <p class="text-[10px] text-gray-500 uppercase">Universal Multi-Asset Router</p>
        </div>
        <div class="bg-gray-800 p-2 rounded-lg border border-gray-700">
            <img src="https://via.placeholder.com/32" class="h-6 w-6">
        </div>
    </div>

    <div class="glass-panel p-6 mb-6">
        <div class="flex gap-2 mb-6">
            <button class="nav-btn btn-blue">Connect</button>
            <button class="nav-btn">Arc Net</button>
            <button class="nav-btn">Arb Net</button>
            <button class="nav-btn text-xs">🔄</button>
        </div>
        <div class="flex justify-between items-start text-[10px] font-bold">
            <div>
                <span class="text-red-500">●</span> <span class="text-gray-500">IDLE</span>
            </div>
            <div class="text-right">
                <p class="text-blue-500 uppercase mb-2">Arc Testnet</p>
                <p>0.00 <span class="text-gray-500">USDC</span></p>
                <p>0.00 <span class="text-gray-500">FURC</span></p>
                <p class="text-yellow-500">0.00 <span class="text-gray-500">USYC</span></p>
                <p class="text-blue-400 mt-4 uppercase">Arbitrum Sepolia</p>
                <p>0.00 <span class="text-gray-500">USDC</span></p>
            </div>
        </div>
    </div>

    <div class="flex gap-2 mb-4">
        <div id="btn-transfer" onclick="openTab('transfer')" class="tab-item tab-active">Transfer</div>
        <div id="btn-swap" onclick="openTab('swap')" class="tab-item">Swap</div>
        <div id="btn-pools" onclick="openTab('pools')" class="tab-item">Pools</div>
        <div id="btn-bridge" onclick="openTab('bridge')" class="tab-item">Bridge</div>
    </div>

    <div class="flex gap-2 mb-6">
        <button class="bg-gray-900 border border-gray-800 text-[10px] px-4 py-2 rounded-lg">USYC Vault</button>
        <button class="bg-gray-900 border border-gray-800 text-[10px] px-4 py-2 rounded-lg">🤖 ArcAI</button>
        <button class="bg-gray-900 border border-gray-800 text-[10px] px-4 py-2 rounded-lg">Scanner</button>
    </div>

    <div class="glass-panel p-6 mb-8">
        <div id="transfer-ui">
            <p class="text-[10px] font-bold text-gray-500 uppercase mb-4 italic">Send Asset</p>
            <select class="w-full bg-gray-900 border border-gray-800 p-3 rounded-lg text-sm mb-4">
                <option>USDC (Stablecoin)</option>
            </select>
            <input type="text" placeholder="Recipient address (0x...)" class="w-full bg-gray-900 border border-gray-800 p-3 rounded-lg text-sm mb-6">
            <button class="w-full btn-blue py-4 rounded-xl font-bold uppercase text-xs">Confirm Send</button>
        </div>

        <div id="swap-ui" class="hidden-section text-center py-10">
            <p class="text-blue-400 font-bold">Swap Engine Ready</p>
        </div>

        <div id="bridge-ui" class="hidden-section text-center py-10">
            <p class="text-blue-400 font-bold">Bridge Route Active</p>
        </div>
    </div>

    <div class="space-y-6">
        <h3 class="text-[10px] font-bold text-blue-500 uppercase italic">Arc Network</h3>
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-gray-900 p-3 rounded-lg text-[9px] text-center font-bold">WEBSITE</div>
            <div class="bg-gray-900 p-3 rounded-lg text-[9px] text-center font-bold">DOCS</div>
            <div class="bg-gray-900 p-3 rounded-lg text-[9px] text-center font-bold">HOUSE</div>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            // All tabs reset
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('transfer-ui').classList.add('hidden-section');
            document.getElementById('swap-ui').classList.add('hidden-section');
            document.getElementById('bridge-ui').classList.add('hidden-section');

            // Set Active Tab
            document.getElementById('btn-' + tabName).classList.add('tab-active');
            
            // Show UI
            if(tabName === 'transfer') document.getElementById('transfer-ui').classList.remove('hidden-section');
            if(tabName === 'swap') document.getElementById('swap-ui').classList.remove('hidden-section');
            if(tabName === 'bridge') document.getElementById('bridge-ui').classList.remove('hidden-section');
        }
    </script>
</body>
    </html>
