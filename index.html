<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Settlement Engine | Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 1.25rem; }
        .tab-btn { padding: 10px; font-size: 10px; font-weight: 800; color: #64748b; border-bottom: 2px solid transparent; transition: 0.3s; cursor: pointer; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .action-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: all 0.3s; cursor: pointer; }
        .hidden-section { display: none; }
        @keyframes flow { 0% { left: -100%; } 100% { left: 100%; } }
        .animate-flow { position: absolute; height: 100%; background: linear-gradient(90deg, transparent, #3b82f6, transparent); width: 50%; animation: flow 2s linear infinite; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Arc <span class="text-blue-500 italic">Engine</span></h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.2em] uppercase">Settlement Terminal v4.0</p>
        </div>
        <button onclick="connectWallet()" id="walletBtn" class="bg-blue-600/20 border border-blue-500/50 px-4 py-2 rounded-xl text-[10px] font-black text-blue-400">
            <i class="fa-solid fa-wallet mr-2"></i>CONNECT WALLET
        </button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="glass-card p-3 border-l-4 border-green-500 flex items-center gap-2">
            <i class="fa-solid fa-circle-check text-green-500 text-[10px]"></i>
            <span class="text-[9px] font-black uppercase text-slate-300">Reserve: 100%</span>
        </div>
        <div class="glass-card p-3 border-l-4 border-blue-500 flex items-center gap-2">
            <i class="fa-solid fa-gas-pump text-blue-500 text-[10px]"></i>
            <span class="text-[9px] font-black uppercase text-blue-400">Gas: USDC</span>
        </div>
    </div>
    <div class="flex justify-between px-2 mb-6">
        <span class="text-[8px] font-black text-green-500 uppercase">● AML Verified</span>
        <span class="text-[8px] font-black text-slate-500 uppercase italic">Latency: 0.18s</span>
    </div>

    <div class="glass-card p-5 mb-6 border-blue-500/30 overflow-hidden relative">
        <div class="flex justify-between items-center px-4 relative z-10">
            <div class="text-center">
                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700 shadow-xl">
                    <i class="fa-brands fa-ethereum text-blue-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-500 uppercase text-[7px]">Source</p>
            </div>
            <div class="flex-1 h-[2px] bg-slate-800 mx-2 relative overflow-hidden"><div class="animate-flow"></div></div>
            <div class="text-center">
                <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center border-2 border-blue-400 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-a text-white text-xl"></i>
                </div>
                <p class="text-[9px] font-black text-blue-400 italic mt-1 uppercase">Arc Node</p>
            </div>
            <div class="flex-1 h-[2px] bg-slate-800 mx-2"></div>
            <div class="text-center">
                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700">
                    <i class="fa-solid fa-vault text-green-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-500 uppercase text-[7px]">Settle</p>
            </div>
        </div>
    </div>

    <div class="flex justify-around mb-6 border-b border-slate-800">
        <button onclick="showTab('transfer')" id="t-transfer" class="tab-btn tab-active uppercase tracking-widest">Transfer</button>
        <button onclick="showTab('swap')" id="t-swap" class="tab-btn uppercase tracking-widest">Swap</button>
        <button onclick="showTab('bridge')" id="t-bridge" class="tab-btn uppercase tracking-widest">Bridge</button>
    </div>

    <div class="glass-card p-6 min-h-[300px]">
        <div id="section-transfer" class="space-y-4">
            <p class="text-[9px] font-black text-blue-400 uppercase italic mb-2 tracking-widest">Asset Transfer</p>
            <input type="text" id="t-addr" placeholder="Recipient Address (0x...)" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs outline-none focus:border-blue-500 font-mono">
            <input type="number" id="t-amt" placeholder="Amount USDC" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold outline-none">
            <button onclick="executeEngine('Transfer')" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase tracking-[0.3em] text-white">Execute Transfer</button>
        </div>
        <div id="section-swap" class="hidden-section space-y-4">
            <p class="text-[9px] font-black text-orange-400 uppercase italic mb-2 tracking-widest">Liquidity Swap</p>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800"><p class="text-[8px] text-slate-500 uppercase">From: USDC</p></div>
            <div class="flex justify-center -my-2"><i class="fa-solid fa-arrow-down-up-lock text-blue-500 text-xs"></i></div>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800"><p class="text-[8px] text-slate-500 uppercase">To: USYC</p></div>
            <button onclick="executeEngine('Swap')" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase tracking-[0.3em] text-white">Execute Swap</button>
        </div>
        <div id="section-bridge" class="hidden-section space-y-4">
            <p class="text-[9px] font-black text-green-400 uppercase italic mb-2 tracking-widest">Bridge Settlement</p>
            <div class="grid grid-cols-2 gap-2 text-center">
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-[10px]">Arb Net</div>
                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-[10px] text-blue-500 font-bold">Arc Net</div>
            </div>
            <input type="number" id="b-amt" placeholder="Bridge Amount" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold outline-none">
            <button onclick="executeEngine('Bridge')" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase tracking-[0.3em] text-white">Initiate Bridge</button>
        </div>
    </div>

    <div id="status-box" class="hidden mt-6 glass-card p-4 border-blue-500/40">
        <div class="flex justify-between items-center">
            <p class="text-[10px] font-bold text-blue-400 uppercase italic">Settlement Finality:</p>
            <span id="timer" class="text-xs font-mono font-bold text-white">0.000s</span>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-md border-t border-slate-800 p-5 flex justify-around items-center">
        <i class="fa-solid fa-house-chimney text-blue-500"></i>
        <i class="fa-solid fa-arrows-spin text-slate-600"></i>
        <i class="fa-solid fa-layer-group text-slate-600"></i>
        <i class="fa-solid fa-fingerprint text-slate-600"></i>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('t-'+id).classList.add('tab-active');
            document.getElementById('section-transfer').classList.add('hidden-section');
            document.getElementById('section-swap').classList.add('hidden-section');
            document.getElementById('section-bridge').classList.add('hidden-section');
            document.getElementById('section-'+id).classList.remove('hidden-section');
        }

        function connectWallet() {
            const btn = document.getElementById('walletBtn');
            btn.innerHTML = "<i class='fa-solid fa-spinner animate-spin mr-2'></i>AUTHORIZING...";
            setTimeout(() => {
                btn.innerHTML = "<span class='text-green-500'>●</span> 0x2091...8B4C";
                alert("Arc Engine: Wallet Connected");
            }, 1000);
        }

        function executeEngine(type) {
            const statusBox = document.getElementById('status-box');
            const timer = document.getElementById('timer');
            statusBox.classList.remove('hidden');
            let start = Date.now();
            let clock = setInterval(() => {
                timer.innerText = ((Date.now() - start) / 1000).toFixed(3) + "s";
            }, 50);
            alert(type + " Route Initiated via Arc Node...");
            setTimeout(() => {
                clearInterval(clock);
                alert("✅ SUCCESS: " + type + " Finalized");
            }, 2000);
        }
    </script>
</body>
                </html>
