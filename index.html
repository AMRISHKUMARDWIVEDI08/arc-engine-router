<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Settlement Engine | Institutional Grade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 1.25rem; }
        .status-badge { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 900; border: 1px solid rgba(34, 197, 94, 0.2); }
        .action-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -5px rgba(37, 99, 235, 0.5); }
        .route-dot { width: 6px; height: 6px; border-radius: 50%; background: #3b82f6; position: relative; }
        .pulse { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white">ARC <span class="text-blue-500 italic">SETTLEMENT</span></h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.3em] uppercase">Liquidity Engine v3.5</p>
        </div>
        <div class="flex items-center gap-2">
            <div class="text-right mr-2">
                <p class="text-[8px] font-black text-green-500 uppercase">System Secure</p>
                <p class="text-[10px] font-mono text-slate-400">0.2ms Latency</p>
            </div>
            <div class="bg-blue-600/10 p-3 rounded-2xl border border-blue-500/20">
                <i class="fa-solid fa-server text-blue-500"></i>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass-card p-3 border-l-2 border-green-500">
            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Compliance Check</p>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-user-shield text-green-500 text-[10px]"></i>
                <span class="text-[10px] font-bold text-white uppercase">AML Verified</span>
            </div>
        </div>
        <div class="glass-card p-3 border-l-2 border-blue-500">
            <p class="text-[8px] text-slate-500 uppercase font-black mb-1">Proof of Reserve</p>
            <div class="flex items-center gap-2 text-blue-400">
                <i class="fa-solid fa-chart-pie text-[10px]"></i>
                <span class="text-[10px] font-bold uppercase">100% Backed</span>
            </div>
        </div>
    </div>

    <div class="glass-card p-5 mb-6 bg-gradient-to-br from-slate-900 to-slate-950 border-blue-500/30">
        <p class="text-[10px] font-black text-blue-400 uppercase mb-4 italic tracking-widest text-center">Institutional Route Mapping</p>
        <div class="flex justify-between items-center px-4 relative">
            <div class="text-center z-10">
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center border border-slate-700 shadow-xl">
                    <i class="fa-brands fa-ethereum text-blue-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-400">SOURCE</p>
            </div>
            
            <div class="flex-1 h-[2px] bg-slate-800 mx-2 relative overflow-hidden">
                <div class="absolute h-full bg-blue-500 w-1/2 animate-[move_2s_linear_infinite]" id="route-flow"></div>
            </div>

            <div class="text-center z-10">
                <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)] border-2 border-blue-400">
                    <i class="fa-solid fa-a text-white text-xl"></i>
                </div>
                <p class="text-[9px] font-black text-blue-400 italic mt-1">ARC NODE</p>
            </div>

            <div class="flex-1 h-[2px] bg-slate-800 mx-2"></div>

            <div class="text-center z-10">
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center border border-slate-700">
                    <i class="fa-solid fa-building-columns text-green-400 text-lg"></i>
                </div>
                <p class="text-[8px] font-bold mt-1 text-slate-400">SETTLE</p>
            </div>
        </div>
    </div>

    <div class="glass-card p-6 mb-6">
        <div class="flex justify-between items-start mb-4">
            <div>
                <p class="text-[10px] text-slate-500 uppercase font-black">Net Liquidity</p>
                <h2 class="text-4xl font-black tracking-tighter">0.00 <span class="text-lg text-slate-600 italic">USDC</span></h2>
            </div>
            <div class="text-right">
                <p class="text-[8px] text-slate-500 uppercase font-bold mb-1">Fee Engine</p>
                <div class="bg-blue-900/30 px-2 py-1 rounded border border-blue-500/30">
                    <span class="text-[10px] font-bold text-blue-400">Gas: USDC</span>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <span class="text-[9px] font-bold text-yellow-500/80 bg-yellow-500/10 px-2 py-1 rounded">USYC: 0.00</span>
            <span class="text-[9px] font-bold text-cyan-400/80 bg-cyan-400/10 px-2 py-1 rounded">FURC: 0.00</span>
        </div>
    </div>

    <div class="glass-card p-6 border-t-4 border-blue-600">
        <div class="space-y-5">
            <div>
                <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Recipient Vault Address</label>
                <input type="text" placeholder="0x..." class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-mono outline-none focus:border-blue-500 transition-all">
            </div>
            <div class="flex gap-3">
                <div class="w-1/3">
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Token</label>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold text-center">USDC</div>
                </div>
                <div class="w-2/3">
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Amount</label>
                    <input type="number" placeholder="0.00" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-xs font-bold outline-none focus:border-blue-500">
                </div>
            </div>
            <button onclick="handleSettlement()" class="w-full action-btn py-5 rounded-xl text-[11px] font-black uppercase tracking-[0.3em] text-white">Execute Settlement Route</button>
        </div>
    </div>

    <div id="timer-box" class="hidden mt-4 text-center glass-card p-3 border-blue-500/50">
        <p class="text-[10px] font-bold text-blue-400 uppercase italic">Settlement Finality: <span id="timer" class="font-mono">0.000s</span></p>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-950/80 backdrop-blur-md border-t border-slate-800 p-5 flex justify-around items-center">
        <i class="fa-solid fa-house-chimney text-blue-500 text-lg"></i>
        <i class="fa-solid fa-arrows-spin text-slate-600 text-lg"></i>
        <i class="fa-solid fa-layer-group text-slate-600 text-lg"></i>
        <i class="fa-solid fa-fingerprint text-slate-600 text-lg"></i>
    </div>

    <script>
        function handleSettlement() {
            const timerBox = document.getElementById('timer-box');
            const timerDisplay = document.getElementById('timer');
            timerBox.classList.remove('hidden');
            
            let startTime = Date.now();
            let interval = setInterval(() => {
                let diff = (Date.now() - startTime) / 1000;
                timerDisplay.innerText = diff.toFixed(3) + "s";
            }, 50);

            setTimeout(() => {
                clearInterval(interval);
                alert("✅ TRANSACTION SETTLED\nStatus: Confirmed on Arc Node\nLatency: 0.182s");
            }, 1800);
        }
    </script>
</body>
    </html>
