<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicFlow Pro - Arc Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        .btn-blue { background: #2563eb; box-shadow: 0 0 20px rgba(37, 99, 235, 0.5); border-radius: 18px; }
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .logo-img { height: 32px; width: auto; object-fit: contain; }
    </style>
</head>
<body class="p-4 min-h-screen" onclick="enableAudio()">

    <div class="flex justify-between items-center mb-10 px-2 mt-4">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Arc Logo" class="logo-img" onerror="this.style.display='none'">
            <div>
                <h1 class="text-2xl font-black italic text-green-400 tracking-tighter uppercase leading-none">SONIC<span class="text-white">FLOW</span></h1>
                <p class="text-[7px] text-slate-500 font-bold tracking-[0.3em] uppercase">Arc Ecosystem</p>
            </div>
        </div>
        <button id="walletBtn" onclick="toggleWallet()" class="glass px-4 py-2 text-[10px] font-black text-blue-400 border-blue-500/20 uppercase tracking-widest">Connect Wallet</button>
    </div>

    <div class="glass p-6 mb-8 shadow-2xl">
        <div class="flex justify-between text-[10px] font-black text-slate-500 uppercase mb-8 border-b border-white/5 pb-2">
            <span class="text-green-400 border-b-2 border-green-400 pb-2">Transfer</span>
            <span class="opacity-40">Bridge</span>
            <span class="opacity-40">Swap</span>
        </div>

        <div class="input-box p-4 mb-4">
            <label class="text-[9px] font-bold text-slate-500 uppercase block mb-2">Recipient Address</label>
            <input type="text" id="targetAddr" placeholder="0x..." class="bg-transparent w-full text-xs outline-none text-blue-300 font-mono uppercase">
        </div>

        <div class="input-box p-4 mb-8">
            <div class="flex justify-between mb-2 text-[9px] font-bold uppercase">
                <span class="text-slate-500">Amount to Send</span>
                <span id="balText" class="text-green-500 font-mono">Balance: 0.00</span>
            </div>
            <div class="flex justify-between items-center">
                <input type="number" id="sendAmt" placeholder="0.00" class="bg-transparent text-4xl font-black outline-none w-1/2">
                <span class="text-xs font-black bg-white/5 px-3 py-2 rounded-xl border border-white/10 uppercase italic">USDC</span>
            </div>
        </div>

        <button onclick="confirmTransfer()" class="w-full btn-blue py-5 text-[11px] font-black uppercase tracking-[0.2em] active:scale-95 transition-all">
            Execute Sonic Route
        </button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10 opacity-60">
        <div class="glass p-4 text-center border-white/5">
            <p class="text-[7px] font-bold text-slate-500 uppercase mb-1">Status</p>
            <p class="text-[10px] font-black uppercase text-green-400">Mainnet Live</p>
        </div>
        <div class="glass p-4 text-center border-white/5">
            <p class="text-[7px] font-bold text-slate-500 uppercase mb-1">Fee Tier</p>
            <p class="text-[10px] font-black uppercase text-blue-400">Economic</p>
        </div>
    </div>

    <script>
        let walletAddress = null;
        let audioPermission = false;

        function enableAudio() { audioPermission = true; }

        function speak(text) {
            if (audioPermission && window.speechSynthesis) {
                const speech = new SpeechSynthesisUtterance(text);
                speech.rate = 1.1;
                window.speechSynthesis.speak(speech);
            }
        }

        async function toggleWallet() {
            if (walletAddress) {
                walletAddress = null;
                document.getElementById('walletBtn').innerText = "Connect Wallet";
                document.getElementById('balText').innerText = "Balance: 0.00";
                speak("Wallet Disconnected");
                return;
            }

            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    walletAddress = await signer.getAddress();
                    
                    // Fetch Real Balance
                    const rawBalance = await provider.getBalance(walletAddress);
                    const formattedBal = parseFloat(ethers.utils.formatEther(rawBalance)).toFixed(4);
                    
                    document.getElementById('walletBtn').innerText = walletAddress.substring(0,6)+"..."+walletAddress.substring(38);
                    document.getElementById('balText').innerText = "Balance: " + formattedBal;
                    speak("Wallet Connected");
                } catch (e) {
                    speak("Connection Error");
                }
            } else {
                alert("Please use Mises or OKX Wallet browser.");
            }
        }

        function confirmTransfer() {
            const addr = document.getElementById('targetAddr').value;
            const amt = document.getElementById('sendAmt').value;
            if (!walletAddress) return speak("Connect wallet");
            if (!addr || !amt) return speak("Details missing");

            speak("Transaction Successful");
            alert("Sent " + amt + " USDC to " + addr);
        }
    </script>
</body>
</html>
