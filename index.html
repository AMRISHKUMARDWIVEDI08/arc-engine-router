<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Router Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; }
        .btn-green { background: #4ade80; color: black; font-weight: 900; border-radius: 16px; box-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-12">
        <h1 class="text-2xl font-black italic tracking-tighter text-green-400">SONIC<span class="text-white">FLOW</span></h1>
        <button class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold border border-white/20">CONNECT</button>
    </div>

    <div class="glass-card p-8 max-w-md mx-auto">
        <div class="flex gap-6 mb-10 text-[10px] font-black uppercase text-slate-500">
            <span class="text-green-400 border-b-2 border-green-400 pb-1">Swap</span>
            <span>Bridge</span>
            <span>Pool</span>
        </div>

        <div class="bg-white/5 rounded-2xl p-5 mb-2 border border-white/5">
            <div class="flex justify-between text-[10px] text-slate-500 font-bold mb-4 uppercase">
                <span>From Arc Network</span>
                <span>Balance: 0.00</span>
            </div>
            <div class="flex justify-between items-center">
                <input type="number" placeholder="0.0" class="bg-transparent text-3xl font-bold outline-none w-1/2">
                <span class="bg-white/10 px-3 py-2 rounded-xl text-sm font-bold border border-white/10">USDC</span>
            </div>
        </div>

        <div class="flex justify-center -my-3 relative z-10">
            <div class="bg-black border border-white/10 p-2 rounded-xl text-green-400">↓</div>
        </div>

        <div class="bg-white/5 rounded-2xl p-5 mb-8 border border-white/5">
            <div class="flex justify-between text-[10px] text-slate-500 font-bold mb-4 uppercase">
                <span>To Sonic Chain</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-3xl font-bold text-slate-600 italic">0.0</span>
                <span class="bg-white/10 px-3 py-2 rounded-xl text-sm font-bold border border-white/10">SONIC</span>
            </div>
        </div>

        <button class="w-full btn-green py-5 text-lg uppercase tracking-widest active:scale-95 transition">
            Execute Sonic Route
        </button>
    </div>
</body>
</html>
